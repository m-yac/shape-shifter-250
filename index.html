<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Polyhedra Craft</title>
    <style>
      @font-face {
        font-family: AST_PremiumExec;
        src: url(WebPlus_AST_PremiumExec.woff);
      }
      /* The whole app is a single 3D canvas filling the window. No chrome yet. */
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      canvas {
        display: block;
      }
      .gui {
        position: fixed;
        font: 38px ui-monospace, AST_PremiumExec, monospace;
        color: #e8e8e8;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
        white-space: pre;
      }
      /* Tiny optional text readout (polyhedron name + verified mark). Toggled by config. */
      #readout {
        left: 12px;
        bottom: 12px;
        display: flex;
        gap: 36px;
        * {
          margin-top: auto;
        }
      }
      .cannotSnubGyro {
        opacity: 0.6;
      }
      /* Operation history list on the right. Click an entry to jump to that state. */
      #history {
        top: 12px;
        right: 12px;
        max-height: calc(100vh - 24px);
        overflow-y: auto;
        max-width: 38vw;
      }
      .history-item {
        padding: 2px 6px;
        /* border-radius: 4px; */
        cursor: pointer;
        white-space: nowrap;
      }
      .history-item:hover {
        background: rgba(255, 255, 255, 0.08);
      }
      /* The current state. */
      .history-item.current {
        background: rgba(78, 224, 122, 0.18);
      }
      .history-item.current .history-label {
        color: #4ee07a;
      }
      /* Redo entries (after the current point) are dimmed. */
      .history-item.future {
        opacity: 0.4;
      }
      .history-label {
        font-weight: 600;
      }
      .history-item.invalid .history-label {
        color: #d98a8a;
      }
      .history-name {
        padding-left: 1.4em;
        opacity: 0.75;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="readout" class="gui">
        <div id="poly-readout"></div>
        <div id="sel-readout"></div>
    </div>
    <div id="history" class="gui"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
