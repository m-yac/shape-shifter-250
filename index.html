<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Polyhedra Craft</title>
    <style>
      @font-face {
        font-family: AST_PremiumExec;
        src: url(WebPlus_AST_PremiumExec.woff);
        font-display: block;
      }

      /* ---------------------------------------------------------------------
         The room: the void the monitor sits in. The bezel is centered in it.
         All themeable colors come from CSS variables set in ui/screen.ts. */
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(130% 130% at 50% 35%, transparent 38%, rgba(0, 0, 0, 0.75) 100%),
          var(--room, #04060a);
      }

      /* The plastic frame of the monitor. Padding (the frame thickness) is set
         from config in JS; the molded look is faked with gradients + shadows. */
      #bezel {
        position: relative;
        border-radius: 24px;
        background: linear-gradient(155deg, var(--bezel-light, #3b3e37) 0%, var(--bezel-dark, #1c1e19) 72%);
        box-shadow:
          0 2px 1px rgba(255, 255, 255, 0.09) inset,
          0 -3px 3px rgba(0, 0, 0, 0.55) inset,
          0 28px 60px rgba(0, 0, 0, 0.6),
          0 1px 0 rgba(0, 0, 0, 0.8);
      }

      /* The glass. Its padding is the dark margin between the bezel and the lit
         raster; the grid inside is sized to an exact multiple of cells in JS. */
      #screen {
        position: relative;
        overflow: hidden;
        border-radius: 8px;
        padding: var(--screen-pad, 14px);
        background: var(--glass, #0a0f0c);
        box-shadow:
          0 0 0 2px rgba(0, 0, 0, 0.85),
          0 0 26px rgba(0, 0, 0, 0.9) inset;
      }

      /* The lit raster: the character-grid origin (0,0). The 3D canvas, the text
         overlays, and the CRT pixel mask all live here and share its top-left. */
      #grid {
        position: relative;
      }

      #app {
        position: absolute;
        inset: 0;
        z-index: 0;
      }
      canvas {
        display: block;
      }

      /* --------------------------------------------------------------------
         Text laid out on the character grid. font-size makes one cell exactly
         --cell-w x --cell-h; line-height = --cell-h keeps lines on the grid. */
      .gui {
        position: absolute;
        z-index: 2;
        font-family: AST_PremiumExec, ui-monospace, monospace;
        font-size: var(--font-px, 38px);
        line-height: var(--cell-h, 38px);
        color: var(--phosphor, #86f2b0);
        text-shadow: var(--glow, 0 0 6px rgba(78, 224, 122, 0.45));
        white-space: pre;
      }

      /* Status readout: the polyhedron block (name + ✓, signature, snub/gyro) and
         the selection block (count + snub/gyro). Each is moved into the body of
         its own box-drawing popup by ui/readout.ts — POLYHEDRON bottom-left and
         SELECTION top-left — so both inherit the green phosphor + glow from the
         popup's .gui. white-space:pre keeps each block's intrinsic line widths so
         its frame can be sized to hug the content. */
      #poly-readout,
      #sel-readout {
        white-space: pre;
        width: max-content; /* shrink to the widest line so the frame can hug it */
      }
      .cannotSnubGyro {
        opacity: 0.4;
      }

      /* --------------------------------------------------------------------
         Popups / panels: a box-drawing frame with a scrollable inner area. */
      .popup-frame {
        position: absolute;
        inset: 0;
        margin: 0;
        color: var(--phosphor-dim, #3f8a5e);
        pointer-events: none;
        white-space: pre;
        font: inherit;
      }
      .popup-body {
        position: absolute;
        overflow-y: auto;
        overflow-x: hidden;
      }
      .popup-body::-webkit-scrollbar {
        width: 6px;
      }
      .popup-body::-webkit-scrollbar-thumb {
        background: var(--phosphor-dim, #3f8a5e);
      }
      .popup-body::-webkit-scrollbar-track {
        background: transparent;
      }

      /* The HISTORY popup's body scrolls when it overflows; snap each (whole-row)
         entry to the scrollport top so resting scroll positions stay on the
         character grid (and thus aligned to the CRT pixel mask). */
      .history-body {
        scroll-snap-type: y mandatory;
      }

      /* History entries (rendered into the HISTORY popup's body). Vertical
         padding stays 0 so each line is exactly one grid row tall. */
      .history-item {
        padding: 0;
        cursor: pointer;
        white-space: nowrap;
        scroll-snap-align: start;
      }
      .history-item:hover {
        background: rgba(78, 224, 122, 0.1);
      }
      .history-item.current {
        background: rgba(78, 224, 122, 0.16);
      }
      .history-item.current .history-label {
        color: var(--phosphor-bright, #d2ffe2);
      }
      .history-item.future {
        opacity: 0.4;
      }
      .history-item.invalid .history-label {
        color: var(--phosphor-warn, #e0a36a);
      }
      .history-name {
        padding-left: 2ch;
        opacity: 0.7;
        font-style: italic;
      }

      /* --------------------------------------------------------------------
         CRT effect layer over the lit raster: a phosphor pixel mask aligned to
         the font's 2px pixels, plus a corner vignette. Click-through, so text
         stays selectable. Sits at the grid origin so the mask lines up with the
         text pixels (background-position 0 0 == the grid's top-left). */
      #crt {
        position: absolute;
        inset: 0;
        z-index: 3;
        pointer-events: none;
      }
      #crt::before {
        content: "";
        position: absolute;
        inset: 0;
        /* Anchored at 0,0 so the mask lines up with the glyph pixel grid. The
           pattern itself is chosen by [data-pixel-mask] below. */
        background-position: 0 0;
      }
      /* "lines": 1px dark lines every --pixel-size in both axes => a grid on
         every font pixel (the original CRT raster look). */
      [data-pixel-mask="lines"] #crt::before {
        background-image:
          repeating-linear-gradient(
            to right,
            rgba(0, 0, 0, var(--pixel-opacity, 0.2)) 0,
            rgba(0, 0, 0, var(--pixel-opacity, 0.2)) 1px,
            transparent 1px,
            transparent var(--pixel-size, 2px)
          ),
          repeating-linear-gradient(
            to bottom,
            rgba(0, 0, 0, var(--pixel-opacity, 0.2)) 0,
            rgba(0, 0, 0, var(--pixel-opacity, 0.2)) 1px,
            transparent 1px,
            transparent var(--pixel-size, 2px)
          );
      }
      /* "dots": one tile per font pixel (--pixel-size square), each holding a
         radial gradient that's clear in the middle and dark toward the corners
         => a phosphor dot per pixel with darkened gaps between. On hi-DPI the
         circle is drawn with many device pixels so it looks round; at 1x it's a
         2x2 swatch but the dark corners still read as a grid. */
      [data-pixel-mask="dots"] #crt::before {
        background-image: radial-gradient(
          circle at center,
          transparent 0%,
          transparent 45%,
          rgba(0, 0, 0, var(--pixel-opacity, 0.2)) 70%
        );
        background-size: var(--pixel-size, 2px) var(--pixel-size, 2px);
      }
      #crt::after {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          120% 120% at 50% 50%,
          transparent 55%,
          rgba(0, 0, 0, var(--vignette-opacity, 0.55)) 100%
        );
      }
    </style>
  </head>
  <body>
    <div id="bezel">
      <div id="screen">
        <div id="grid">
          <div id="app"></div>
          <!-- Each block is moved into its own box-drawing popup by ui/readout.ts:
               #poly-readout framed bottom-left, #sel-readout framed top-left. -->
          <div id="poly-readout"></div>
          <div id="sel-readout"></div>
          <!-- The HISTORY panel popup is created in JS (ui/historyPanel.ts). -->
          <div id="crt"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
